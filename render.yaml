# Render.com Blueprint — deploys the FloodCast dashboard straight from git.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: floodcast
    runtime: python
    plan: free
    # The Flask app lives in the prototype/ sub-folder.
    rootDir: prototype
    buildCommand: pip install -r requirements.txt
    # Bind the port immediately; models train in a background thread so Render's
    # port scan succeeds. A single worker keeps memory within the free plan.
    startCommand: gunicorn app.server:app --bind 0.0.0.0:$PORT --workers 1 --timeout 300
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
